<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="icon" type="image/jpg" href="First Project">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="QuoteGenerator.css">
</head>
<body>
   <div class="quote-container" id="quote-container">
        <!-- Quote -->
        <div class="quote-text">
            <i class="fas fa-quote-left"></i>
            <span id="quote">The problem is not the problem. The problem is your attitude about the problem. Do you understand?</span>
            <i class="fas fa-quote-right"></i>
            <!-- Author -->
            <div class="quote-author">
                <span id="author">Captain Jack Sparrow</span>
            </div>
            <!-- Buttons -->
            <div class="button-container">
                <button class="twitter-button" id="twitter" title="Tweet This!"><i class="fab fa-twitter"></i>
                </button>
                <button id="id-quote">New Quote</button>
            </div>
        </div>
    </div>
    <script src="QuoteGenerator.js"></script>
</body> 
</html>
